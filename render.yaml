services:
  - type: web
    name: wchf-license-server
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: wchf-license-db
          property: connectionString
      - key: LICENSE_SECRET_KEY
        sync: false   # isi manual di Render dashboard
      - key: ADMIN_SECRET
        sync: false   # isi manual di Render dashboard
      - key: ALLOWED_ORIGINS
        value: https://your-dashboard.vercel.app  # ganti dengan URL Vercel kamu

databases:
  - name: wchf-license-db
    databaseName: wchf_license
    plan: free
